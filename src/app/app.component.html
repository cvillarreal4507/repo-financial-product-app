<div class="app-layout">
  <header class="app-header">
    <div class="header-container container">
      <h1 class="app-title">{{ 'PAGE_TITLE_PRODUCTS' | translate }}</h1>
      <div class="lang-selector">
        <app-dropdown align="right" placement="bottom">
          <button trigger class="lang-btn">
            <svg class="lang-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"
              fill="currentColor">
              <path
                d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z" />
            </svg>
            <span class="lang-text">{{ activeLang === 'es' ? 'ES' : 'EN' }}</span>
            <svg class="arrow-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14"
              fill="currentColor">
              <path d="M7 10l5 5 5-5z" />
            </svg>
          </button>

          <div menu class="lang-menu premium-card">
            <button class="lang-item" [class.active]="activeLang === 'es'" (click)="setLanguage('es')">
              {{ 'SPANISH' | translate }}
            </button>
            <button class="lang-item" [class.active]="activeLang === 'en'" (click)="setLanguage('en')">
              {{ 'ENGLISH' | translate }}
            </button>
          </div>
        </app-dropdown>
      </div>
    </div>
  </header>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>

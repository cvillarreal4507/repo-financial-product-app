<div class="form-container container animate-fade-in">
  <div class="form-card premium-card glassmorphism">
    <div class="back-link-wrapper">
      <button class="back-btn" (click)="onBack()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        {{ 'BTN_BACK_TO_LIST' | translate }}
      </button>
    </div>

    <div class="form-header">
      <h1 class="form-title text-gradient">
        {{ (isEditMode ? 'FORM_TITLE_EDIT' : 'FORM_TITLE_REGISTER') | translate }}
      </h1>
      <p class="form-subtitle">
        {{ (isEditMode ? 'FORM_SUBTITLE_EDIT' : 'FORM_SUBTITLE_REGISTER') | translate }}
      </p>
    </div>

    <!-- Loading Indicator in Edit Mode -->
    <div class="form-loading" *ngIf="isLoadingProduct">
      <app-skeleton width="150px" height="24px"></app-skeleton>
      <div class="sk-grid">
        <app-skeleton *ngFor="let item of [1,2,3,4,5,6]" width="100%" height="45px"></app-skeleton>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!isLoadingProduct" class="product-form">
      <div class="form-grid">
        <!-- ID Field -->
        <app-input
          #idInput
          id="id"
          [label]="'LABEL_ID' | translate"
          [placeholder]="'PLACEHOLDER_ID' | translate"
          formControlName="id"
          [required]="true"
          [isInvalid]="!!(form.get('id')?.invalid && (form.get('id')?.dirty || form.get('id')?.touched))"
          [errorMessage]="getIdErrorMessage()"
        ></app-input>

        <!-- Name Field -->
        <app-input
          id="name"
          [label]="'LABEL_NAME' | translate"
          [placeholder]="'PLACEHOLDER_NAME' | translate"
          formControlName="name"
          [required]="true"
          [isInvalid]="!!(form.get('name')?.invalid && (form.get('name')?.dirty || form.get('name')?.touched))"
          [errorMessage]="getNameErrorMessage()"
        ></app-input>

        <!-- Description Field -->
        <app-input
          id="description"
          [label]="'LABEL_DESCRIPTION' | translate"
          [placeholder]="'PLACEHOLDER_DESCRIPTION' | translate"
          formControlName="description"
          [required]="true"
          [isInvalid]="!!(form.get('description')?.invalid && (form.get('description')?.dirty || form.get('description')?.touched))"
          [errorMessage]="getDescriptionErrorMessage()"
        ></app-input>

        <!-- Logo Field -->
        <app-input
          id="logo"
          [label]="'LABEL_LOGO' | translate"
          [placeholder]="'PLACEHOLDER_LOGO' | translate"
          formControlName="logo"
          [required]="true"
          [isInvalid]="!!(form.get('logo')?.invalid && (form.get('logo')?.dirty || form.get('logo')?.touched))"
          [errorMessage]="getLogoErrorMessage()"
        ></app-input>

        <!-- Release Date Field -->
        <app-input
          id="date_release"
          [label]="'LABEL_RELEASE_DATE' | translate"
          type="date"
          formControlName="date_release"
          [required]="true"
          [isInvalid]="!!(form.get('date_release')?.invalid && (form.get('date_release')?.dirty || form.get('date_release')?.touched))"
          [errorMessage]="getReleaseDateErrorMessage()"
        ></app-input>

        <!-- Revision Date Field (Calculated, Disabled) -->
        <app-input
          id="date_revision"
          [label]="'LABEL_REVISION_DATE' | translate"
          type="date"
          formControlName="date_revision"
          [required]="true"
          [readonly]="true"
        ></app-input>
      </div>

      <div class="form-actions">
        <app-button
          type="button"
          variant="outline"
          (btnClick)="onReset()"
          [disabled]="isSaving"
        >
          {{ 'BTN_RESET' | translate }}
        </app-button>
        <app-button
          type="submit"
          variant="primary"
          [loading]="isSaving"
          [disabled]="form.invalid || isSaving"
        >
          {{ (isEditMode ? 'BTN_SAVE_CHANGES' : 'BTN_SUBMIT') | translate }}
        </app-button>
      </div>
    </form>
  </div>
</div>
